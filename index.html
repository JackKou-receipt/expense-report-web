<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Expense Portal - API Integrated v4.2</title>
    <script src="https://alcdn.msauth.net/browser/2.35.0/js/msal-browser.min.js"></script>
    <style>
        /* Base Styling */
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f3f2f1; margin: 0; padding: 0; color: #323130; }
        .header { background-color: #0078d4; color: white; padding: 15px 20px; font-size: 20px; font-weight: bold; display: flex; justify-content: space-between; align-items: center; }
        .container { padding: 20px; max-width: 800px; margin: 0 auto; }
        
        /* Layout Modules */
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 20px; box-sizing: border-box; }
        .section-title { margin: 0; font-size: 18px; border-left: 4px solid #0078d4; padding-left: 10px; color: #0078d4; display: inline-block; }
        
        /* Form Components */
        .form-group { margin-top: 15px; }
        .form-group label { display: block; font-size: 14px; font-weight: 600; margin-bottom: 5px; }
        .form-control { width: 100%; padding: 12px; border: 1px solid #a6a6a6; border-radius: 6px; box-sizing: border-box; font-size: 16px; font-family: inherit; }
        
        /* Buttons */
        .btn { padding: 14px; border-radius: 6px; cursor: pointer; border: none; font-size: 16px; font-weight: bold; width: 100%; text-align: center; display: block; transition: 0.2s; box-sizing: border-box; text-decoration: none; }
        .btn-primary { background: #0078d4; color: white; }
        .btn-outline { background: white; color: #0078d4; border: 1px solid #0078d4; }
        .btn-success { background: #107c41; color: white; margin-top: 15px; }
        .btn-danger { background: #a4262c; color: white; padding: 6px 12px; font-size: 12px; width: auto; border-radius: 4px; border: none; cursor: pointer; }

        /* Item Row */
        .item-row { display: flex; align-items: center; background: white; padding: 15px; border-radius: 8px; margin-top: 10px; border: 1px solid #edebe9; gap: 15px; box-sizing: border-box; }
        .item-thumb { width: 80px; height: 80px; border-radius: 4px; object-fit: cover; border: 1px solid #ddd; flex-shrink: 0; }
        .item-info { flex-grow: 1; min-width: 0; }
        
        /* Overlay */
        .login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.95); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="login-screen" class="login-overlay">
        <h2 style="color: #0078d4; margin-bottom: 20px;">Global Expense Portal</h2>
        <button class="btn btn-primary" style="width: 250px;" onclick="signIn()">Sign in with Microsoft Account</button>
    </div>

    <div class="header">
        <span>Global Expense Portal</span>
        <span id="display-name" style="font-size: 14px; font-weight: normal;"></span>
    </div>

    <div class="container">
        <div class="card">
            <h3 class="section-title">New Request</h3>
            
            <div id="data-status" style="background: #f8f8f8; padding: 12px; border-radius: 6px; margin-top: 15px; font-size: 14px; border-left: 4px solid #888;">
                <strong>Waiting for login...</strong>
            </div>

            <div class="form-group">
                <label>Merchant Name</label>
                <input type="text" id="new-merchant" class="form-control" placeholder="e.g., Starbucks">
            </div>

            <div class="form-group">
                <label>Category</label>
                <select id="new-category" class="form-control">
                    <option value="Transportation">🚗 Transportation</option>
                    <option value="Meals" selected>🍔 Meals & Entertainment</option>
                    <option value="Accommodation">🏨 Accommodation</option>
                </select>
            </div>

            <div class="form-group">
                <label>Receipt Image</label>
                <label class="btn btn-outline" id="file-label">
                    📸 Take Photo / Upload Receipt
                    <input type="file" id="new-file" accept="image/*" onchange="handleFileSelect(this)">
                </label>
                <img id="temp-preview" class="hidden" style="width: 100%; margin-top: 15px; border-radius: 6px; border: 1px solid #ddd;">
            </div>

            <button class="btn btn-primary" style="margin-top: 20px;" onclick="addItem()">Add to Queue</button>
        </div>

        <div class="item-list">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                <h3 class="section-title">Queue & Batch Export</h3>
                <button class="btn-danger" onclick="clearHistory()">🗑️ Clear History</button>
            </div>
            <div id="items-container">
                <p id="empty-msg" style="text-align: center; color: #666; padding: 40px; background: #fff; border-radius: 8px;">Your queue is currently empty.</p>
            </div>
            <div id="export-section" class="hidden">
                <button class="btn btn-success" onclick="exportSelected()">📥 Export Selected to Batch Report (HTML)</button>
            </div>
        </div>
    </div>

    <script>
        // ======= 1. API 配置 =======
        const msalConfig = {
            auth: {
                clientId: "cbe1c29b-f66b-4726-b50d-17dc5098a0c1",
                authority: "https://login.microsoftonline.com/27a26ea8-6b7d-4465-b025-bea752e8e082",
                redirectUri: window.location.origin + window.location.pathname
            }
        };

        const sharepointConfig = {
            siteId: "aseus-my.sharepoint.com,45734fb1-d80c-489a-b75d-447fc8a97dbf,57e3cc08-0f5a-472e-89a1-77889e917dbf",
            listId: "e6db8eda-1975-44c5-b45b-b2251f1e27f4"
        };

        const myMsal = new msal.PublicClientApplication(msalConfig);
        let fetchedData = { date: "Loading...", amount: "0.00" };
        let expenseItems = [];
        let currentFileData = "";

        // ======= 2. 登入與資料抓取 =======
        async function signIn() {
            try {
                const loginResponse = await myMsal.loginPopup({ scopes: ["User.Read", "Sites.Read.All"] });
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('display-name').innerText = "User: " + loginResponse.account.name;
                fetchListData();
            } catch (e) { console.error(e); }
        }

        async function fetchListData() {
            try {
                const accounts = myMsal.getAllAccounts();
                const tokenResponse = await myMsal.acquireTokenSilent({ scopes: ["Sites.Read.All"], account: accounts[0] });
                const endpoint = `https://graph.microsoft.com/v1.0/sites/${sharepointConfig.siteId}/lists/${sharepointConfig.listId}/items?expand=fields`;
                
                const response = await fetch(endpoint, { headers: { 'Authorization': `Bearer ${tokenResponse.accessToken}` } });
                const data = await response.json();
                
                if (data.value && data.value.length > 0) {
                    const fields = data.value[data.value.length - 1].fields;
                    fetchedData = { 
                        date: fields.ExpenseDateandTime || "N/A", 
                        amount: fields.ExpenseAmount || "0.00" 
                    };
                    document.getElementById('data-status').innerHTML = `
                        <strong>Auto-fetched Data:</strong><br>
                        Last Record: ${fetchedData.date} | Amount: <span style="color:#d83b01; font-weight:bold;">$${fetchedData.amount}</span>
                    `;
                }
            } catch (e) { 
                document.getElementById('data-status').innerText = "Error syncing with SharePoint.";
                console.error(e); 
            }
        }

        // ======= 3. UI 邏輯 =======
        function handleFileSelect(input) {
            const reader = new FileReader();
            reader.onload = (e) => {
                currentFileData = e.target.result;
                document.getElementById('temp-preview').src = currentFileData;
                document.getElementById('temp-preview').classList.remove('hidden');
                document.getElementById('file-label').innerText = "✅ Receipt Attached";
            };
            reader.readAsDataURL(input.files[0]);
        }

        function addItem() {
            const merchant = document.getElementById('new-merchant').value;
            if (!merchant || !currentFileData) return alert("Please fill merchant and add photo.");

            expenseItems.push({
                ...fetchedData,
                merchant,
                category: document.getElementById('new-category').value,
                image: currentFileData,
                id: Date.now(),
                legacyId: ""
            });
            renderItems();
            resetForm();
        }

        function renderItems() {
            const container = document.getElementById('items-container');
            container.innerHTML = "";
            document.getElementById('empty-msg').style.display = expenseItems.length === 0 ? "block" : "none";
            document.getElementById('export-section').className = expenseItems.length === 0 ? "hidden" : "";
            
            expenseItems.forEach(item => {
                const div = document.createElement('div');
                div.className = "item-row";
                div.innerHTML = `
                    <input type="checkbox" class="item-checkbox" data-id="${item.id}" checked style="width:20px; height:20px;">
                    <img src="${item.image}" class="item-thumb">
                    <div class="item-info">
                        <b>${item.merchant} ($${item.amount})</b><br>
                        <span style="font-size:12px; color:#666;">${item.date}</span>
                        <input type="text" class="form-control" style="margin-top:5px; padding:8px;" placeholder="Legacy ID" onchange="updateLegacyId(${item.id}, this.value)">
                    </div>
                `;
                container.appendChild(div);
            });
        }

        function updateLegacyId(id, val) {
            const item = expenseItems.find(i => i.id === id);
            if (item) item.legacyId = val;
        }

        function clearHistory() {
            if (confirm("Clear session?")) { expenseItems = []; renderItems(); }
        }

        function resetForm() {
            document.getElementById('new-merchant').value = "";
            document.getElementById('temp-preview').classList.add('hidden');
            document.getElementById('file-label').innerText = "📸 Take Photo / Upload Receipt";
            currentFileData = "";
        }

        function exportSelected() {
            const checkedIds = Array.from(document.querySelectorAll('.item-checkbox:checked')).map(cb => parseInt(cb.dataset.id));
            const selectedItems = expenseItems.filter(i => checkedIds.includes(i.id));
            selectedItems.sort((a,b) => (a.legacyId||"").localeCompare(b.legacyId||"", undefined, {numeric:true}));

            let htmlBody = "";
            selectedItems.forEach(item => {
                htmlBody += `
                    <div style="border: 2px solid #333; padding: 40px; margin-bottom: 60px; page-break-after: always; max-width: 800px; margin: auto; background: white;">
                        <h1 style="color:#0078d4; border-bottom: 4px solid #0078d4;">Expense Voucher - ID: ${item.legacyId || "N/A"}</h1>
                        <p><b>Merchant:</b> ${item.merchant} | <b>Amount:</b> $${item.amount} | <b>Date:</b> ${item.date}</p>
                        <img src="${item.image}" style="max-width: 100%; border: 1px solid #ddd;">
                    </div>`;
            });

            const blob = new Blob([`<html><body style="font-family:sans-serif;padding:50px;background:#f3f2f1;">${htmlBody}</body></html>`], { type: 'text/html' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `Batch_Report_${Date.now()}.html`;
            link.click();
        }
    </script>
</body>
</html>
